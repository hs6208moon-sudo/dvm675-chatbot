  <style>
    :root {
      --surface-0: #ffffff;
      --surface-1: #f5f5f5;
      --surface-2: #efefef;
      --text-primary: #000000;
      --text-secondary: #666666;
      --text-muted: #999999;
      --bot-bg: #efefef;
      --bot-text: #000000;
      --user-bg: #1f7f5c;
      --user-text: #ffffff;
      --accent: #1f7f5c;
      --border: #d4d4d4;
      color-scheme: light;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-0: #0a0a0a;
        --surface-1: #1a1a1a;
        --surface-2: #242424;
        --text-primary: #f0f0f0;
        --text-secondary: #b0b0b0;
        --text-muted: #808080;
        --bot-bg: #2a2a2a;
        --bot-text: #f0f0f0;
        --user-bg: #1f7f5c;
        --user-text: #ffffff;
        --accent: #66bb6a;
        --border: #333333;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { width: 100%; height: 100%; }
    
    body {
      background: var(--surface-0);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      overflow: hidden;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* 헤더 */
    .header {
      padding: 12px 16px;
      background: var(--surface-0);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #2d9b4e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-title h2 {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
    }

    .header-title p {
      font-size: 12px;
      color: var(--text-muted);
      margin: 2px 0 0 0;
    }

    /* 메시지 영역 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--surface-0);
    }

    .message-group {
      display: flex;
      gap: 8px;
      animation: slideIn 0.3s ease;
      align-items: flex-end;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-group.user {
      flex-direction: row-reverse;
      justify-content: flex-end;
    }

    .message-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), #2d9b4e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message-group.user .message-icon {
      display: none;
    }

    .message-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 70%;
    }

    .message-group.user .message-content {
      max-width: 85%;
      align-items: flex-end;
    }

    .message-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .message-group.bot .message-bubble {
      background: var(--bot-bg);
      color: var(--bot-text);
      border-radius: 12px 12px 12px 4px;
    }

    .message-group.user .message-bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-radius: 12px 4px 12px 12px;
    }

    .message-time {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 40px;
      text-align: right;
    }

    .message-group.user .message-time {
      text-align: left;
    }

    /* 리스트 아이템 */
    .list-items {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .list-item {
      padding: 10px 12px;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      color: var(--text-primary);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      text-align: left;
    }

    .list-item:hover {
      background: var(--surface-2);
      border-color: var(--accent);
      color: var(--accent);
    }

    .list-item:active {
      transform: scale(0.98);
    }

    .list-number {
      width: 20px;
      height: 20px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* 상세 정보 */
    .detail-text {
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* 모델 선택 */
    .model-section {
      padding: 12px 16px;
      background: var(--surface-0);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      flex-shrink: 0;
    }

    .model-btn {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface-1);
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .model-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .model-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* 입력 영역 */
    .input-section {
      padding: 12px 16px;
      background: var(--surface-0);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .input-box {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface-1);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-box:focus {
      border-color: var(--accent);
    }

    .input-box::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .send-btn:hover {
      opacity: 0.8;
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 반응형 */
    @media (max-width: 480px) {
      .message-content {
        max-width: 80%;
      }

      .message-group.user .message-content {
        max-width: 90%;
      }

      .model-section {
        overflow-x: auto;
        justify-content: flex-start;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }
  </style>
</head>

        },
        '모델 교체 순서': {
          intro: '모델 교체 순서에 대해 알려 드리겠습니다!',
          items: [
            '1. 하우징 변경',
            '2. 모델 별 Rotor 확인 및 Robot 대차 투입 → Start',
            '3. 모델 별 Shaft JIG 길이 확인',
            '4. 베어링 압입 공정 터치 판넬 길이 설정 (판넬 클릭)',
            '5. 착자 공정 600W or 900W 설정 (마우스 클릭)',
            '6. 역기 전력 PC 600W or 900W 설정 (마우스 클릭)',
            '7. 검사기 터치 판넬, 모델 별 높이 설정 (판넬 클릭)',
            '8. 내전압 PC 모델명 변경 (마우스 클릭)',
            '9. MES PC 실적 모델 변경 (마우스 클릭)'
          ]
        },
        '포장 순서': {
          intro: '포장 순서에 대해 알려 드리겠습니다!',
          items: [
            '1. 파렛트 준비',
            '2. 포장물 준비 (하부 커버 → 비닐백 → PAD)',
            '3. 포장물 내 DVM Cross PAD 펼치기',
            '4. 실리카겔 - Cross PAD 1층마다 1개 넣기',
            '5. 양산 제품 순차 적재 (1단 : 16개)',
            '6. (1단 적재 완료 시) PAD 안착 → Cross PAD 펼치기 → 제품 순차 적재 (반복)',
            '   * 4단 : 64개 완료 시 PAD 안착 마무리',
            '7. 비닐백 씌우기',
            '8. Side Box 씌우기',
            '9. 상부 커버 닫기',
            '10. Side Box에 모델 별 정보 적기 (모델(도장), 날짜, 작업자명)',
            '11. 제품 밴딩',
            '12. 출하 라벨 부착'
          ]
        }
      }
    };

    const models = ['DVM-675A/B', 'DVM-675E/F', 'DVM-675L', 'DVM-675G', 'DVM-675H'];
    const categories = ['모델 교체 사양', '모델 교체 순서', '포장 순서'];

    function App() {
      const [selectedModel, setSelectedModel] = useState('DVM-675A/B');
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [input, setInput] = useState('');
      const [messages, setMessages] = useState([
        {
          type: 'bot',
          text: '안녕하세요! 👋\nDVM-675 정보를 알려드리겠습니다.',
          time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
        }
      ]);
      const messagesEndRef = useRef(null);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const handleModelSelect = (model) => {
        // 이미 선택된 모델이면 메시지 보내지 않음
        if (selectedModel === model) {
          return;
        }

        setSelectedModel(model);
        setSelectedCategory(null);
        setMessages(prev => [...prev, 
          {
            type: 'user',
            text: model,
            time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
          },
          {
            type: 'bot',
            text: `${model} 모델이 선택되었습니다!`,
            hasCategories: true,
            time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
          }
        ]);
      };

      const handleCategorySelect = (category) => {
        setSelectedCategory(category);
        const data = infoData[selectedModel][category];
        setMessages(prev => [...prev, 
          {
            type: 'user',
            text: `· ${category}`,
            time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
          },
          {
            type: 'bot',
            text: data.intro,
            details: data.items,
            time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
          }
        ]);
      };

      const handleTextInput = (text) => {
        if (!text.trim()) return;

        setMessages(prev => [...prev, {
          type: 'user',
          text: text,
          time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
        }]);

        const lowerText = text.toLowerCase();
        let foundCategory = null;
        let foundModel = selectedModel;

        if (lowerText.includes('675a') || lowerText.includes('a/b')) foundModel = 'DVM-675A/B';
        else if (lowerText.includes('675e') || lowerText.includes('e/f')) foundModel = 'DVM-675E/F';
        else if (lowerText.includes('675l')) foundModel = 'DVM-675L';
        else if (lowerText.includes('675g')) foundModel = 'DVM-675G';
        else if (lowerText.includes('675h')) foundModel = 'DVM-675H';

        if (lowerText.includes('사양')) {
          foundCategory = '모델 교체 사양';
        } else if (lowerText.includes('순서')) {
          foundCategory = '모델 교체 순서';
        } else if (lowerText.includes('포장')) {
          foundCategory = '포장 순서';
        }

        if (foundCategory) {
          setSelectedModel(foundModel);
          setSelectedCategory(foundCategory);
          const data = infoData[foundModel][foundCategory];
          setMessages(prev => [...prev, {
            type: 'bot',
            text: data.intro,
            details: data.items,
            time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
          }]);
        } else if (lowerText.includes('675')) {
          setSelectedModel(foundModel);
          setSelectedCategory(null);
          setMessages(prev => [...prev, {
            type: 'bot',
            text: `${foundModel} 모델이 선택되었습니다!`,
            hasCategories: true,
            time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
          }]);
        } else {
          setMessages(prev => [...prev, {
            type: 'bot',
            text: `다음과 같이 입력해주세요:\n"모델 교체 사양"\n"교체 순서"\n"포장 순서"\n또는 "675A/B 포장 순서" 등`,
            time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
          }]);
        }
      };

      const sendMessage = () => {
        if (!input.trim()) return;
        handleTextInput(input);
        setInput('');
      };

      return (
        <div className="container">
          <div className="header">
            <div className="header-icon">
              <i className="ti ti-robot"></i>
            </div>
            <div className="header-title">
              <h2>C&M Smart AI Chatbot</h2>
              <p>🟢 온라인 상태</p>
            </div>
          </div>

          <div className="messages">
            {messages.map((msg, idx) => (
              <div key={idx} className={`message-group ${msg.type}`}>
                {msg.type === 'bot' && <div className="message-icon"><i className="ti ti-robot"></i></div>}
                
                <div className="message-content">
                  <div className="message-bubble">
                    {msg.text}
                    {msg.hasCategories && (
                      <div className="list-items" style={{ marginTop: '8px' }}>
                        {categories.map((cat, i) => (
                          <button
                            key={i}
                            className="list-item"
                            onClick={() => handleCategorySelect(cat)}
                          >
                            <div className="list-number">{i + 1}</div>
                            {cat}
                          </button>
                        ))}
                      </div>
                    )}
                    {msg.details && (
                      <div className="detail-text" style={{ marginTop: '8px' }}>
                        {msg.details.join('\n')}
                      </div>
                    )}
                  </div>
                  <div className="message-time">{msg.time}</div>
                </div>
              </div>
            ))}
            <div ref={messagesEndRef} />
          </div>

          <div className="model-section">
            {models.map(model => (
              <button
                key={model}
                className={`model-btn ${selectedModel === model ? 'active' : ''}`}
                onClick={() => handleModelSelect(model)}
              >
                {model}
              </button>
            ))}
          </div>

          <div className="input-section">
            <input
              type="text"
              className="input-box"
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyPress={(e) => {
                if (e.key === 'Enter') sendMessage();
              }}
              placeholder="메시지를 입력하세요..."
            />
            <button
              className="send-btn"
              onClick={sendMessage}
              disabled={!input.trim()}
            >
              <i className="ti ti-send"></i>
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('app'));

    // PWA Service Worker 등록
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`
        self.addEventListener('install', (event) => {
          self.skipWaiting();
        });

        self.addEventListener('activate', (event) => {
          event.waitUntil(clients.claim());
        });

        self.addEventListener('fetch', (event) => {
          event.respondWith(fetch(event.request).catch(() => {
            return new Response('오프라인 상태입니다', { status: 503 });
          }));
        });
      `)).catch(err => console.log('Service Worker 등록 실패:', err));
    }
  </script>
</body>
</html>
