<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C&M Smart AI Chatbot</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2d8659" />
  <meta name="description" content="C&M Smart AI Chatbot - 제품 정보 제공" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="C&M Chatbot" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --surface-0: #ffffff;
      --surface-1: #f5f5f5;
      --text-primary: #000000;
      --text-secondary: #666666;
      --text-muted: #999999;
      --bot-bg: #e8e8e8;
      --bot-text: #000000;
      --user-bg: #0084ff;
      --user-text: #ffffff;
      --accent: #2d8659;
      --border: #d4d4d4;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-0: #0a0a0a;
        --surface-1: #1a1a1a;
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --text-muted: #808080;
        --bot-bg: #2a2a2a;
        --bot-text: #ffffff;
        --border: #333333;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--surface-0);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      background-color: var(--surface-1);
      border-bottom: 1px solid var(--border);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      background-color: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 20px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
    }

    .header-status {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message-group {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-bottom: 8px;
    }

    .message-group.bot {
      justify-content: flex-start;
    }

    .message-group.user {
      justify-content: flex-end !important;
      flex-direction: row-reverse !important;
      margin-left: auto !important;
      width: auto;
    }

    .message-icon {
      width: 32px;
      height: 32px;
      background-color: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 70%;
      width: auto;
    }

    .message-group.user .message-content {
      align-items: flex-end;
    }

    .message-bubble {
      background-color: var(--bot-bg);
      color: var(--bot-text);
      padding: 10px 14px;
      border-radius: 12px 12px 12px 0;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .message-group.user .message-bubble {
      background-color: var(--user-bg);
      color: var(--user-text);
      border-radius: 12px 12px 0 12px;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
      margin: 0 8px;
    }

    .buttons-section {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px;
      background-color: var(--surface-1);
      border-top: 1px solid var(--border);
      justify-content: center;
    }

    .buttons-section:empty {
      display: none;
    }

    .buttons-header {
      display: flex;
      align-items: center;
      gap: 12px;
      background-color: var(--surface-1);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
    }

    .buttons-header:hover {
      background-color: rgba(45, 134, 89, 0.1);
    }

    .buttons-toggle-arrow {
      font-size: 16px;
      font-weight: bold;
      color: var(--accent);
      transition: transform 0.3s ease;
    }

    .buttons-toggle-arrow.collapsed {
      transform: rotate(-90deg);
    }

    .buttons-header-text {
      font-weight: 600;
      color: var(--text-primary);
    }

    .buttons-container {
      max-height: 1000px;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .buttons-container.collapsed {
      max-height: 0;
    }

    .category-btn, .model-btn, .info-btn, .detail-btn {
      padding: 10px 16px;
      background-color: var(--surface-0);
      border: 2px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .category-btn:hover, .model-btn:hover, .info-btn:hover, .detail-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .category-btn.active, .model-btn.active {
      background-color: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .info-btn, .detail-btn {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
    }

    .input-section {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background-color: var(--surface-1);
      border-top: 1px solid var(--border);
    }

    .input-field {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      background-color: var(--surface-0);
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
    }

    .input-field:focus {
      border-color: var(--accent);
    }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background-color: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover {
      opacity: 0.9;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--surface-0);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
  </style>
</head>

    <div class="header">
      <div class="header-icon">💬</div>
      <div>
        <div class="header-title">C&M Smart AI Chatbot</div>

        </div>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="buttons-header" id="buttonsHeader">

      <span class="buttons-header-text">카테고리 선택</span>

    <div class="buttons-container" id="buttonsContainer">

      <div class="buttons-section" id="subcategoryButtons"></div>
      <div class="buttons-section" id="modelButtons"></div>
      <div class="buttons-section" id="infoButtons"></div>
      <div class="buttons-section" id="detailButtons"></div>
    </div>

    <div class="input-section">

      group.appendChild(content);
      messagesDiv.appendChild(group);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function initialize() {
      addBotMessage('안녕하세요! 👋\nC&M Smart AI Chatbot입니다!\n제품 정보를 제공합니다.\n카테고리를 선택해주세요.');
      renderCategoryButtons();
    }

    function renderCategoryButtons() {
      categoryButtonsDiv.innerHTML = '';
      Object.keys(productData).forEach(category => {
        const btn = document.createElement('button');
        btn.className = `category-btn ${selectedCategory === category ? 'active' : ''}`;
        btn.textContent = category;
        btn.onclick = () => selectCategory(category);
        categoryButtonsDiv.appendChild(btn);
      });
    }

    function renderSubcategoryButtons() {
      subcategoryButtonsDiv.innerHTML = '';
      if (!selectedCategory) return;
      if (selectedCategory === '에어컨모터 125W') {
        const subcats = Object.keys(productData[selectedCategory]);
        subcats.forEach(subcat => {
          const btn = document.createElement('button');
          btn.className = `category-btn ${selectedSubcategory === subcat ? 'active' : ''}`;
          btn.textContent = subcat;
          btn.onclick = () => selectSubcategory(subcat);
          subcategoryButtonsDiv.appendChild(btn);
        });
      }
    }

    function renderModelButtons() {
      modelButtonsDiv.innerHTML = '';
      if (!selectedCategory) return;
      let models = {};
      if (selectedCategory === '에어컨모터 125W' && selectedSubcategory) {
        models = productData[selectedCategory][selectedSubcategory];
      } else if (selectedCategory !== '에어컨모터 125W') {
        models = productData[selectedCategory];
      }
      Object.keys(models).forEach(model => {
        const btn = document.createElement('button');
        btn.className = `model-btn ${selectedModel === model ? 'active' : ''}`;
        btn.textContent = model;
        btn.onclick = () => selectModel(model);
        modelButtonsDiv.appendChild(btn);
      });
    }

    function renderInfoButtons() {
      infoButtonsDiv.innerHTML = '';
      if (!selectedModel) return;
      let modelData = {};
      if (selectedCategory === '에어컨모터 125W' && selectedSubcategory) {
        modelData = productData[selectedCategory][selectedSubcategory][selectedModel];
      } else if (selectedCategory !== '에어컨모터 125W') {
        modelData = productData[selectedCategory][selectedModel];
      }
      Object.keys(modelData).forEach(info => {
        const btn = document.createElement('button');
        btn.className = 'info-btn';
        btn.textContent = info;
        btn.onclick = () => selectInfo(info);
        infoButtonsDiv.appendChild(btn);
      });
    }

    function renderDetailButtons() {
      detailButtonsDiv.innerHTML = '';
      if (selectedCategory === '에어컨모터 125W' && selectedInfo === '· Rotor 모델 교체 순서' && selectedSubcategory === 'A라인') {
        const details = rotorDetails['A라인'];
        if (details) {
          Object.keys(details).forEach(detail => {
            const btn = document.createElement('button');
            btn.className = 'detail-btn';
            btn.textContent = detail;
            btn.onclick = () => showDetail(detail);
            detailButtonsDiv.appendChild(btn);
          });
        }
      }
    }

    function selectCategory(category) {
      selectedCategory = category;
      selectedSubcategory = null;
      selectedModel = null;
      selectedInfo = null;
      renderCategoryButtons();
      renderSubcategoryButtons();
      renderModelButtons();
      infoButtonsDiv.innerHTML = '';
      detailButtonsDiv.innerHTML = '';
      addUserMessage(category);
      setTimeout(() => {
        if (category === '에어컨모터 125W') {
          addBotMessage(`✓ ${category} 선택됨\n\n라인을 선택해주세요.`);
        } else {
          addBotMessage(`✓ ${category} 선택됨\n\n모델을 선택해주세요.`);
        }
      }, 300);
    }

    function selectSubcategory(subcat) {
      selectedSubcategory = subcat;
      selectedModel = null;
      selectedInfo = null;
      renderSubcategoryButtons();
      renderModelButtons();
      infoButtonsDiv.innerHTML = '';
      detailButtonsDiv.innerHTML = '';
      addUserMessage(subcat);
      setTimeout(() => {
        addBotMessage(`✓ ${subcat} 선택됨\n\n모델을 선택해주세요.`);
      }, 300);
    }

    function selectModel(model) {
      selectedModel = model;
      selectedInfo = null;
      renderModelButtons();
      renderInfoButtons();
      detailButtonsDiv.innerHTML = '';
      addUserMessage(model);
      setTimeout(() => {
        addBotMessage(`✓ ${model} 선택됨\n\n정보를 선택해주세요.`);
      }, 300);
    }

    function selectInfo(info) {
      selectedInfo = info;
      renderDetailButtons();
      addUserMessage(info);
      let modelData = {};
      if (selectedCategory === '에어컨모터 125W' && selectedSubcategory) {
        modelData = productData[selectedCategory][selectedSubcategory][selectedModel];
      } else if (selectedCategory !== '에어컨모터 125W') {
        modelData = productData[selectedCategory][selectedModel];
      }
      const infoText = modelData[info];
      setTimeout(() => {
        if (infoText === null) {
          addBotMessage(`✓ ${info} 선택됨\n\n세부 항목을 선택해주세요.`);
        } else {
          addBotMessage(infoText);
        }
      }, 300);
    }

    function showDetail(detail) {
      addUserMessage(detail);
      const detailText = rotorDetails['A라인'][detail];
      setTimeout(() => {
        addBotMessage(detailText);
      }, 300);
    }

    function handleInput() {
      const text = inputField.value.trim();
      if (!text) return;
      addUserMessage(text);
      inputField.value = '';
      
      if (!selectedModel) {
        setTimeout(() => {
          addBotMessage('먼저 카테고리, 모델을 선택해주세요.');
        }, 300);
        return;
      }

      const lowerText = text.toLowerCase();
      let modelData = {};
      if (selectedCategory === '에어컨모터 125W' && selectedSubcategory) {
        modelData = productData[selectedCategory][selectedSubcategory][selectedModel];
      } else if (selectedCategory !== '에어컨모터 125W') {
        modelData = productData[selectedCategory][selectedModel];
      }

      let response = '';

      // 모델 교체/변경 검색
      if (lowerText.includes('교체') || lowerText.includes('변경') || lowerText.includes('사양')) {
        response = modelData['· 모델 교체 사양'];
      }
      // 순서 검색
      else if (lowerText.includes('순서')) {
        if (modelData['· 모델 교체 순서']) {
          response = modelData['· 모델 교체 순서'];
        } else if (modelData['· Rotor 모델 교체 순서']) {
          response = '세부 항목을 선택해주세요.';
        }
      }
      // 포장 검색
      else if (lowerText.includes('포장') || lowerText.includes('제품')) {
        response = modelData['· 포장 순서'];
      }

      if (!response) {
        response = `질문: "${text}"\n\n죄송합니다. 정확한 정보를 찾기 어렵습니다.\n정보 버튼을 선택해주세요.`;
      }

      setTimeout(() => {
        addBotMessage(response);
      }, 300);
    }

    sendBtn.onclick = handleInput;
    inputField.onkeypress = (e) => {
      if (e.key === 'Enter') handleInput();
    };
    initialize();
  </script>
</body>
</html>
