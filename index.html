<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C&M Smart AI Chatbot</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2d8659" />
  <meta name="description" content="C&M Smart AI Chatbot - DVM-675 정보 제공" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="C&M Chatbot" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --surface-0: #ffffff;
      --surface-1: #f5f5f5;
      --text-primary: #000000;
      --text-secondary: #666666;
      --text-muted: #999999;
      --bot-bg: #e8e8e8;
      --bot-text: #000000;
      --user-bg: #0084ff;
      --user-text: #ffffff;
      --accent: #2d8659;
      --border: #d4d4d4;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-0: #0a0a0a;
        --surface-1: #1a1a1a;
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --text-muted: #808080;
        --bot-bg: #2a2a2a;
        --bot-text: #ffffff;
        --border: #333333;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--surface-0);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      background-color: var(--surface-1);
      border-bottom: 1px solid var(--border);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      background-color: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 20px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
    }

    .header-status {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message-group {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-bottom: 8px;
    }

    .message-group.bot {
      justify-content: flex-start;
    }

    .message-group.user {
      justify-content: flex-end !important;
      flex-direction: row-reverse !important;
      margin-left: auto !important;
      margin-right: 0 !important;
    }

    .message-icon {
      width: 32px;
      height: 32px;
      background-color: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 70%;
      width: auto;
    }

    .message-group.user .message-content {
      align-items: flex-end;
    }

    .message-bubble {
      background-color: var(--bot-bg);
      color: var(--bot-text);
      padding: 10px 14px;
      border-radius: 12px 12px 12px 0;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .message-group.user .message-bubble {
      background-color: var(--user-bg);
      color: var(--user-text);
      border-radius: 12px 12px 0 12px;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
      margin: 0 8px;
    }

    .buttons-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 70%;
      margin-top: 8px;
    }

    .btn {
      padding: 12px 16px;
      background-color: var(--surface-1);
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-primary);
      transition: all 0.2s;
      text-align: center;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .category-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 12px;
      background-color: var(--surface-1);
      border-top: 1px solid var(--border);
    }

    .category-btn {
      padding: 10px 14px;
      background-color: var(--surface-0);
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .category-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .model-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 12px;
      background-color: var(--surface-1);
      border-top: 1px solid var(--border);
    }

    .model-btn {
      padding: 10px 16px;
      background-color: var(--surface-0);
      border: 2px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .model-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .model-btn.active {
      background-color: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .input-section {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background-color: var(--surface-1);
      border-top: 1px solid var(--border);
    }

    .input-field {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      background-color: var(--surface-0);
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
    }

    .input-field:focus {
      border-color: var(--accent);
    }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background-color: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover {
      opacity: 0.9;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--surface-0);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
  </style>
</head>

    function getTime() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      return `${hours}:${minutes}`;
    }

    function addBotMessage(text) {
      const group = document.createElement('div');
      group.className = 'message-group bot';
      
      const icon = document.createElement('div');
      icon.className = 'message-icon';
      icon.textContent = '🤖';
      
      const content = document.createElement('div');
      content.className = 'message-content';
      
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;
      content.appendChild(bubble);
      
      const time = document.createElement('div');
      time.className = 'message-time';
      time.textContent = getTime();
      content.appendChild(time);

      group.appendChild(content);
      messagesDiv.appendChild(group);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function initialize() {
      addBotMessage('안녕하세요! 👋\nC&M Smart AI Chatbot입니다!\nDVM-675 정보를 제공합니다.\n모델을 선택해주세요.');
      renderModelButtons();
    }

    function renderModelButtons() {
      modelButtonsDiv.innerHTML = '';
      models.forEach(model => {
        const btn = document.createElement('button');
        btn.className = `model-btn ${selectedModel === model ? 'active' : ''}`;
        btn.textContent = model;
        btn.onclick = () => selectModel(model);
        modelButtonsDiv.appendChild(btn);
      });
    }

    function renderCategoryButtons() {
      if (!selectedModel) return;
      categoryButtonsDiv.innerHTML = '';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'category-btn';
        btn.textContent = cat;
        btn.onclick = () => showInfo(selectedModel, cat);
        categoryButtonsDiv.appendChild(btn);
      });
    }

    function selectModel(model) {
      selectedModel = model;
      renderModelButtons();
      renderCategoryButtons();
      addUserMessage(model);
      setTimeout(() => {
        addBotMessage(`✓ ${model} 선택됨`);
      }, 300);
    }

    function showInfo(model, category) {
      addUserMessage(category);
      const info = infoData[model][category];
      setTimeout(() => {
        addBotMessage(info);
      }, 300);
    }

    function handleInput() {
      const text = inputField.value.trim();
      if (!text) return;

      addUserMessage(text);
      inputField.value = '';

      if (!selectedModel) {
        setTimeout(() => {
          addBotMessage('먼저 모델을 선택해주세요.');
        }, 300);
        return;
      }

      const lowerText = text.toLowerCase();
      let response = '';

      if (lowerText.includes('교체') || lowerText.includes('변경') || lowerText.includes('사양') || lowerText.includes('하우징') || lowerText.includes('하네스') || lowerText.includes('샤프트')) {
        response = infoData[selectedModel]['· 모델 교체 사양'];
      }
      else if (lowerText.includes('순서') || lowerText.includes('rotor') || lowerText.includes('shaft')) {
        response = infoData[selectedModel]['· 모델 교체 순서'];
      }
      else if (lowerText.includes('포장') || lowerText.includes('제품') || lowerText.includes('파렛트') || lowerText.includes('밴딩')) {
        response = infoData[selectedModel]['· 포장 순서'];
      }
      else {
        response = `질문: "${text}"\n\n죄송합니다. 정확한 정보를 찾기 어렵습니다.\n다음 키워드로 검색해보세요:\n- 교체/변경/사양 → 모델 교체 사양\n- 순서 → 모델 교체 순서\n- 포장/제품 → 포장 순서`;
      }

      setTimeout(() => {
        addBotMessage(response);
      }, 300);
    }

    sendBtn.onclick = handleInput;
    inputField.onkeypress = (e) => {
      if (e.key === 'Enter') handleInput();
    };

    initialize();
  </script>
</body>
</html>
